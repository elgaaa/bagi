<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>ProGroup | Professional Group Randomizer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --primary: #0f172a;
      --accent: #2563eb;
      --surface: #ffffff;
      --bg: #f8fafc;
    }
    * { 
        font-family: 'Plus Jakarta Sans', sans-serif; 
        -webkit-tap-highlight-color: transparent;
    }
    body { 
      background-color: var(--bg);
      color: #1e293b;
    }
    .glass-card {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(226, 232, 240, 0.8);
    }
    .input-premium {
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      border: 1px solid #e2e8f0;
    }
    .input-premium:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
      background: #ffffff;
    }
    .btn-premium {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      background: #0f172a;
    }
    .btn-premium:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
      background: #1e293b;
    }
    .btn-premium:active {
      transform: translateY(0);
    }
    .group-card-premium {
      animation: slideUp 0.4s ease-out forwards;
      opacity: 0;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
  </style>
</head>
<body class="antialiased min-h-screen">

  <nav class="sticky top-0 z-40 w-full glass-card border-b border-slate-200 py-4 px-6 mb-8">
    <div class="max-w-7xl mx-auto flex justify-between items-center">
      <div class="flex items-center gap-3">
        <div class="bg-blue-600 p-2 rounded-lg">
          <i class="fas fa-layer-group text-white text-lg"></i>
        </div>
        <div>
            <h1 class="text-xl font-bold tracking-tight text-slate-900 leading-none">ProGroup</h1>
            <span class="text-[10px] text-slate-500 font-semibold uppercase tracking-widest">Randomizer Engine</span>
        </div>
      </div>
      <div class="hidden md:flex items-center gap-2 text-sm font-medium text-slate-500">
        <i class="fas fa-shield-halved text-blue-500"></i>
        Local Processing Only
      </div>
    </div>
  </nav>

  <div class="max-w-7xl mx-auto px-4 md:px-8 pb-12">
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
      
      <div class="lg:col-span-4 space-y-6">
        
        <div class="glass-card rounded-2xl p-6 shadow-sm">
          <h2 class="text-sm font-bold uppercase tracking-widest text-slate-400 mb-6 flex items-center gap-2">
            <i class="fas fa-sliders text-blue-600"></i> Parameter
          </h2>
          
          <div class="space-y-5">
            <div>
              <label class="block text-xs font-bold text-slate-700 uppercase mb-2">Target Kelompok</label>
              <input type="number" id="groupCount" min="1" max="50" value="3" 
                class="w-full px-4 py-3 rounded-xl bg-white/50 input-premium text-sm font-medium">
            </div>
            
            <div class="relative py-2">
                <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-slate-100"></div></div>
                <div class="relative flex justify-center text-[10px] uppercase font-bold tracking-widest"><span class="bg-slate-50 px-3 text-slate-400">Atau</span></div>
            </div>

            <div>
              <label class="block text-xs font-bold text-slate-700 uppercase mb-2">Kapasitas per Kelompok</label>
              <input type="number" id="membersPerGroup" min="1" max="100" placeholder="Opsional" 
                class="w-full px-4 py-3 rounded-xl bg-white/50 input-premium text-sm font-medium">
            </div>
          </div>
        </div>

        <div class="glass-card rounded-2xl p-6 shadow-sm">
          <h2 class="text-sm font-bold uppercase tracking-widest text-slate-400 mb-6 flex items-center gap-2">
            <i class="fas fa-link text-blue-600"></i> Fitur Anti Lepas
          </h2>
          <div class="space-y-4">
            <div class="bg-blue-50/50 p-3 rounded-xl mb-4">
              <p class="text-[11px] text-blue-800 leading-relaxed font-medium">Pasangkan 2 nama agar selalu dalam 1 kelompok. Masukkan dengan format: <b>Nama A & Nama B</b></p>
            </div>
            <textarea id="pairsInput" rows="3" 
              class="w-full px-4 py-3 rounded-xl bg-white/50 input-premium text-sm font-medium resize-none" 
              placeholder="Andi & Budi&#10;Caca & Dedi"></textarea>
          </div>
        </div>

        <div class="glass-card rounded-2xl p-6 shadow-sm">
          <div class="flex justify-between items-center mb-6">
            <h2 class="text-sm font-bold uppercase tracking-widest text-slate-400 flex items-center gap-2">
              <i class="fas fa-users text-blue-600"></i> Partisipan
            </h2>
            <span id="totalNamesCount" class="text-[11px] font-bold bg-slate-900 text-white px-2 py-0.5 rounded-md">0</span>
          </div>

          <div class="space-y-4">
            <div class="flex gap-2">
              <label class="flex-1 cursor-pointer">
                <div class="flex items-center justify-center gap-2 py-2.5 px-4 border border-dashed border-slate-300 rounded-xl text-xs font-bold text-slate-600 hover:bg-slate-50 transition-colors">
                  <i class="fas fa-file-arrow-up"></i> Import
                </div>
                <input type="file" id="fileUpload" accept=".json,.txt" class="hidden">
              </label>
              <button id="loadExampleBtn" class="px-4 py-2.5 text-xs font-bold border border-slate-200 rounded-xl hover:bg-slate-50 transition-colors text-slate-600">
                Sample
              </button>
            </div>

            <textarea id="namesInput" rows="6" 
              class="w-full px-4 py-3 rounded-xl bg-white/50 input-premium text-sm font-medium resize-none" 
              placeholder="Input nama (satu per baris)..."></textarea>
            
            <div class="flex gap-2">
              <button id="resetNamesBtn" class="flex-1 text-[11px] font-bold text-slate-600 hover:text-slate-900 transition-colors">Default</button>
              <div class="w-px h-3 bg-slate-200 my-auto"></div>
              <button id="clearNamesBtn" class="flex-1 text-[11px] font-bold text-red-500 hover:text-red-700 transition-colors">Clear All</button>
            </div>
          </div>
        </div>

        <div class="flex flex-col gap-3">
          <button id="generateBtn" class="btn-premium w-full text-white font-bold py-4 rounded-2xl shadow-lg flex items-center justify-center gap-3 tracking-wide">
            <i class="fas fa-shuffle"></i> Generate Kelompok
          </button>
          <button id="copyResultBtn" class="w-full bg-white border border-slate-200 text-slate-700 font-bold py-3 rounded-2xl flex items-center justify-center gap-2 text-sm hover:bg-slate-50 transition-colors">
            <i class="far fa-copy"></i> Salin Hasil
          </button>
        </div>
      </div>

      <div class="lg:col-span-8">
        <div class="glass-card rounded-3xl min-h-[600px] flex flex-col overflow-hidden shadow-sm">
          <div class="p-6 border-b border-slate-100 flex flex-wrap justify-between items-center gap-4 bg-white/50">
            <h2 class="text-lg font-bold text-slate-800 flex items-center gap-3">
              <i class="fas fa-square-poll-horizontal text-blue-600"></i>
              Visualisasi Hasil
            </h2>
            <div id="infoSummary" class="text-xs font-bold text-slate-400 bg-slate-100 px-3 py-1.5 rounded-full uppercase tracking-tighter">
              Waiting for action
            </div>
          </div>

          <div id="groupsContainer" class="p-6 md:p-8 overflow-y-auto flex-1 bg-slate-50/20">
            </div>
        </div>
      </div>

    </div>
  </div>

  <footer class="max-w-7xl mx-auto px-8 py-8 text-center">
    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em]">Built for Professionals &bull; ProGroup v2.1</p>
  </footer>

  <script>
    // ---------------------- STATE & LOGIC -------------------------
    let currentNames = [];
    let lastGeneratedGroups = [];

    const namesTextarea = document.getElementById('namesInput');
    const pairsTextarea = document.getElementById('pairsInput');
    const totalNamesSpan = document.getElementById('totalNamesCount');
    const generateBtn = document.getElementById('generateBtn');
    const resetNamesBtn = document.getElementById('resetNamesBtn');
    const clearNamesBtn = document.getElementById('clearNamesBtn');
    const fileUpload = document.getElementById('fileUpload');
    const loadExampleBtn = document.getElementById('loadExampleBtn');
    const groupsContainer = document.getElementById('groupsContainer');
    const groupCountInput = document.getElementById('groupCount');
    const membersPerGroupInput = document.getElementById('membersPerGroup');
    const copyResultBtn = document.getElementById('copyResultBtn');
    const infoSummary = document.getElementById('infoSummary');

    function updateUIFromNames() {
      namesTextarea.value = currentNames.join('\n');
      totalNamesSpan.innerText = currentNames.length;
    }

    function setNamesFromString(rawStr) {
      let lines = rawStr.split(/\r?\n/);
      let names = lines.map(l => l.trim()).filter(l => l !== "");
      currentNames = [...new Set(names)];
      updateUIFromNames();
      return true;
    }

    function setDefaultExample() {
      const defaultNames = [
        "Alexander Graham", "Beatrix Kiddo", "Charles Xavier", "Diana Prince", "Erik Lehnsherr",
        "Fiona Gallagher", "George Miller", "Helena Bertinelli", "Ivan Vanko", "Julianne Moore",
        "Katherine Johnson", "Leonidas I", "Marcus Aurelius", "Natasha Romanoff", "Oliver Queen"
      ];
      currentNames = [...defaultNames];
      pairsTextarea.value = "Alexander Graham & Beatrix Kiddo";
      updateUIFromNames();
    }

    function handleFileUpload(file) {
      const reader = new FileReader();
      reader.onload = (e) => {
        const content = e.target.result;
        const fileType = file.name.split('.').pop().toLowerCase();
        try {
          if (fileType === 'json') {
            const parsed = JSON.parse(content);
            if (Array.isArray(parsed)) setNamesFromString(parsed.join('\n'));
          } else if (fileType === 'txt') {
            setNamesFromString(content);
          }
        } catch (err) { console.error(err); }
      };
      reader.readAsText(file, "UTF-8");
    }

    function shuffleArray(arr) {
      const array = [...arr];
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    }

    function generateGroups() {
      syncNamesFromTextarea();
      if (currentNames.length === 0) {
        groupsContainer.innerHTML = `<div class="text-center py-20 opacity-50 font-bold text-slate-400">Input nama untuk memulai</div>`;
        return;
      }

      // Process Pairs
      let pairs = [];
      const pairLines = pairsTextarea.value.split('\n').filter(l => l.includes('&'));
      let pairedNames = new Set();
      
      pairLines.forEach(line => {
        let parts = line.split('&').map(p => p.trim());
        if (parts.length >= 2 && parts[0] && parts[1]) {
          pairs.push([parts[0], parts[1]]);
          pairedNames.add(parts[0]);
          pairedNames.add(parts[1]);
        }
      });

      // Combine all names (ensure paired names are in total list)
      let allNames = [...new Set([...currentNames, ...pairedNames])];
      let soloNames = allNames.filter(n => !pairedNames.has(n));
      
      // Determine Group Count
      let totalItems = soloNames.length + pairs.length;
      let targetGroups = parseInt(groupCountInput.value) || 1;
      let membersPerGroupRaw = membersPerGroupInput.value.trim();
      
      if (membersPerGroupRaw !== "") {
        let fixedSize = parseInt(membersPerGroupRaw);
        targetGroups = Math.ceil(allNames.length / (fixedSize || 1));
      }
      if (targetGroups > allNames.length) targetGroups = allNames.length;
      if (targetGroups < 1) targetGroups = 1;

      // Logic pembagian: Campur pairs dan solos
      let randomizedItems = shuffleArray([...pairs, ...soloNames]);
      let groups = Array.from({ length: targetGroups }, () => []);

      // Round robin distribution
      randomizedItems.forEach((item, index) => {
        let groupIdx = index % targetGroups;
        if (Array.isArray(item)) {
          groups[groupIdx].push(...item);
        } else {
          groups[groupIdx].push(item);
        }
      });

      lastGeneratedGroups = groups.filter(g => g.length > 0);
      renderGroupsToDOM(lastGeneratedGroups);
      infoSummary.innerText = `${allNames.length} Partisipan • ${lastGeneratedGroups.length} Kelompok`;
    }

    function renderGroupsToDOM(groups) {
      groupsContainer.innerHTML = '';
      const grid = document.createElement('div');
      grid.className = 'grid grid-cols-1 md:grid-cols-2 gap-6';

      groups.forEach((group, idx) => {
        const card = document.createElement('div');
        card.className = 'group-card-premium bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden flex flex-col h-fit';
        card.style.animationDelay = `${idx * 0.05}s`;
        
        card.innerHTML = `
          <div class="px-5 py-3 bg-slate-50 border-b border-slate-100 flex justify-between items-center">
            <span class="text-[10px] font-black uppercase tracking-widest text-slate-400">Kelompok ${idx+1}</span>
            <span class="text-[10px] font-bold bg-white text-blue-600 border border-blue-100 px-2 py-0.5 rounded-full">${group.length} Orang</span>
          </div>
          <div class="p-5">
            <ul class="space-y-3">
              ${group.map((name, mIdx) => `
                <li class="flex items-center gap-3">
                  <span class="text-[10px] font-bold text-slate-300 w-4">${mIdx+1}</span>
                  <span class="text-sm font-semibold text-slate-700">${escapeHtml(name)}</span>
                </li>
              `).join('')}
            </ul>
          </div>
        `;
        grid.appendChild(card);
      });
      groupsContainer.appendChild(grid);
    }

    function escapeHtml(str) {
      return str.replace(/[&<>]/g, (m) => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
    }

    function copyResultToClipboard() {
      if (lastGeneratedGroups.length === 0) {
        alert("Belum ada hasil untuk disalin.");
        return;
      }
      
      let copyText = "📋 PROGROUP RESULT\n";
      copyText += "----------------------------\n";
      lastGeneratedGroups.forEach((group, i) => {
        copyText += `\nKELOMPOK ${i+1} (${group.length} Orang):\n`;
        group.forEach((name, idx) => {
          copyText += `${idx+1}. ${name}\n`;
        });
      });
      
      navigator.clipboard.writeText(copyText).then(() => {
        const originalText = copyResultBtn.innerHTML;
        copyResultBtn.innerHTML = '<i class="fas fa-check text-green-500"></i> Berhasil Disalin';
        setTimeout(() => { copyResultBtn.innerHTML = originalText; }, 2000);
      });
    }

    function syncNamesFromTextarea() {
      const raw = namesTextarea.value;
      const lines = raw.split(/\r?\n/);
      currentNames = [...new Set(lines.map(l => l.trim()).filter(l => l !== ""))];
      totalNamesSpan.innerText = currentNames.length;
    }

    // Event Listeners
    namesTextarea.addEventListener('input', syncNamesFromTextarea);
    resetNamesBtn.addEventListener('click', setDefaultExample);
    clearNamesBtn.addEventListener('click', () => {
      currentNames = []; updateUIFromNames();
      pairsTextarea.value = "";
      groupsContainer.innerHTML = '<div class="text-center py-20 opacity-30 text-slate-400">Daftar dikosongkan</div>';
    });
    generateBtn.addEventListener('click', generateGroups);
    copyResultBtn.addEventListener('click', copyResultToClipboard);
    fileUpload.addEventListener('change', (e) => {
      if (e.target.files[0]) { handleFileUpload(e.target.files[0]); fileUpload.value = ''; }
    });
    loadExampleBtn.addEventListener('click', setDefaultExample);

    // Initial
    setDefaultExample();
    setTimeout(generateGroups, 100);
  </script>
</body>
</html>
